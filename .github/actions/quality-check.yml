name: Quality assurance
description: Check code quality and security review over code

runs:
  using: composite
  steps:
    # Ruff: linter de Python que detecta errores, malas prácticas y problemas de estilo.
    # Falla el job si encuentra algo, evitando que código sucio llegue a main.
    # Configuración en toml. ruff sale con código != 0 al detectar violaciones.
    - name: Code format check (Ruff)
      run: uv run ruff check . --output-format=github
      continue-on-error: false

    # Mypy: Es un verificador de tipos de codigo estatico. no ejecuta el código, solo lo analiza
    # Además, es capaz de analizar los tipados de librerias.
    # Configuración en toml en la raíz del proyecto
    - name: Type check (Mypy)
      run: uv run mypy src/
      continue-on-error: false

    - name: Secrets scan (gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: false

    - name: Dependency audit
      run: uv run pip-audit

    #  Static security analysis with semgrep
    - name: SATS with bandit
      run: |
        uv run bandit -f custom --msg-template \
          "{relpath}[{line}] - ID {test_id}: SEVERITY: {severity} - {msg}"
      continue-on-error: false

    #  Static security analysis with semgrep
    - name: SATS with semgrep
      run: |
        uv run semgrep scan \
          --config=p/python \
          --config=p/fastapi src/ \
          --config=p/owasp-top-ten \
          --baseline-commit=${{ github.event.pull_request.base.sha }} \
          --severity=ERROR \
          --severity=WARNING \
          --error \
          --sarif \
          --output=semgrep-output.sarif
      continue-on-error: true

    - name: Upload semgrep analysis Github Security
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: semgrep-output.sarif
