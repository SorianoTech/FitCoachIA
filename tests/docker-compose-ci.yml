services:
  fitcoach-ia:
    container_name: fitcoach-ia
    restart: unless-stopped
    build:
      context: ../src
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge
