name: deploy
description: Deploy last release generated


inputs:
  version:
    description: 'Version de la aplicación'
    required: true
  host:
    description: 'Url del servidor'
    required: true
  port:
    description: 'Puerto al que conectar'
    required: false
    default: 22
  key:
    description: 'Key content to connect to server'
    required: true
  username:
    description: 'Username to connect to the server'
    required: true

runs:
  using: composite
  steps:
    - name: Restart service
      uses: favware/ssh-remote-action@v1
      with:
        host: ${{ inputs.host }}
        port: ${{ inputs.port }}
        key: ${{ inputs.key }}
        username: ${{ inputs.username }}
        command: |
          echo "[deploy] Paso 1/3: verificando si existe /app/deploy.sh..."
          if [ ! -f /app/deploy.sh ]; then
            echo "[deploy] Error: no se encontro /app/deploy.sh"
            exit 1
          fi
          echo "[deploy] Fichero /app/deploy.sh encontrado."

          echo "[deploy] Paso 2/3: asignando permisos de ejecucion a /app/deploy.sh..."
          chmod +x /app/deploy.sh
          echo "[deploy] Permisos asignados correctamente."

          echo "[deploy] Paso 3/3: ejecutando /app/deploy.sh con version ${{ inputs.version }}..."
          /app/deploy.sh ${{ inputs.version }}

